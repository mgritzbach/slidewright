name: Core CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: python -m pip install --disable-pip-version-check -r requirements-ci.txt
      - run: npm test
      - run: npm run demo:compile
      - run: npm run demo:lint

  windows-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: python -m pip install --disable-pip-version-check -r requirements-ci.txt
      - run: npm test
      - run: npm run demo:compile
      - run: npm run demo:lint
