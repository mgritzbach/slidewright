name: Core CI

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  deterministic-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: npm ci
      - run: python -m pip install --disable-pip-version-check -r requirements-ci.txt
      - run: npm run evidence:ci
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: slidewright-public-evidence-${{ runner.os }}-${{ github.sha }}
          path: outputs/public-evidence/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

  windows-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: npm ci
      - run: python -m pip install --disable-pip-version-check -r requirements-ci.txt
      - run: npm run evidence:ci
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: slidewright-public-evidence-${{ runner.os }}-${{ github.sha }}
          path: outputs/public-evidence/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

  cross-platform-evidence:
    needs: [deterministic-core, windows-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/download-artifact@v8
        with:
          pattern: slidewright-public-evidence-*-${{ github.sha }}
          path: outputs/ci-evidence
      - run: npm run evidence:aggregate -- --input outputs/ci-evidence --out outputs/public-evidence-aggregate
      - uses: actions/upload-artifact@v7
        with:
          name: slidewright-cross-platform-replication-${{ github.sha }}
          path: outputs/public-evidence-aggregate/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

  installation-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm ci
      - run: npm ci --prefix tools/installation
      - run: node --test tests/installation.test.mjs
      - run: node scripts/run-installation-benchmark.mjs
        env:
          SLIDEWRIGHT_MARKETPLACE_SOURCE: ${{ github.repository }}
          SLIDEWRIGHT_MARKETPLACE_REF: ${{ github.sha }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: slidewright-installation-${{ runner.os }}-${{ github.sha }}
          path: outputs/installation/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

  installation-aggregate:
    needs: [installation-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/download-artifact@v8
        with:
          pattern: slidewright-installation-*-${{ github.sha }}
          path: outputs/installation-hosts
      - run: node scripts/aggregate-installation-evidence.mjs --input outputs/installation-hosts --out outputs/installation-aggregate
      - uses: actions/upload-artifact@v7
        with:
          name: slidewright-installation-aggregate-${{ github.sha }}
          path: outputs/installation-aggregate/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

  runtime-bootstrap-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            profile: windows
          - os: macos-latest
            profile: macos
          - os: ubuntu-latest
            profile: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm ci
      - run: node --test tests/runtime-bootstrap.test.mjs tests/reliability.test.mjs
      - run: node scripts/run-runtime-bootstrap-benchmark.mjs --profile ${{ matrix.profile }} --out outputs/runtime-bootstrap/${{ matrix.profile }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: slidewright-runtime-bootstrap-${{ matrix.profile }}-${{ github.sha }}
          path: outputs/runtime-bootstrap/${{ matrix.profile }}/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

  runtime-bootstrap-aggregate:
    needs: [runtime-bootstrap-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/download-artifact@v8
        with:
          pattern: slidewright-runtime-bootstrap-*-${{ github.sha }}
          path: outputs/runtime-bootstrap-hosts
      - run: node scripts/aggregate-runtime-bootstrap-evidence.mjs --scope native --input outputs/runtime-bootstrap-hosts --out outputs/runtime-bootstrap-aggregate
      - uses: actions/upload-artifact@v7
        with:
          name: slidewright-runtime-bootstrap-aggregate-${{ github.sha }}
          path: outputs/runtime-bootstrap-aggregate/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
